<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#10162B" />
<meta name="description" content="Turn any link, WiFi password, or text into a scannable QR code instantly. Free, no sign-up, no tracking." />
<title>QR Code Generator — Vikash Ranjan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --ink:#10162B;
    --ink-2:#1B2347;
    --paper:#F6F1E2;
    --paper-shade:#ECE3CB;
    --field:#FBF7EC;
    --line:#C9BFA0;
    --ink-soft:#5B5446;
    --accent:#FF7A33;
    --accent-deep:#C65A1E;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; min-height:100%; }

  body{
    font-family:'IBM Plex Mono', monospace;
    background: radial-gradient(circle at 50% -10%, var(--ink-2) 0%, #0A0E1E 60%, #07091a 100%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
  }

  .stage{
    background-color:var(--ink);
    background-image:radial-gradient(circle, rgba(255,255,255,.09) 1px, transparent 1.6px);
    background-size:16px 16px;
    border-radius:30px;
    padding:30px;
    box-shadow:0 40px 80px -30px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.05);
    width:100%;
    max-width:460px;
  }

  .ticket{
    background:var(--paper);
    border-radius:20px;
    display:flex;
    flex-direction:column;
    overflow:visible;
    position:relative;
    box-shadow:0 1px 0 rgba(255,255,255,.55) inset, 0 18px 40px -22px rgba(0,0,0,.35);
  }

  .stub{ padding:28px; }

  .eyebrow-row{
    display:flex;
    align-items:center;
    gap:7px;
    margin:0 0 10px;
  }
  .eyebrow-row svg{ flex-shrink:0; }

  .eyebrow{
    font:600 11px/1 'IBM Plex Mono', monospace;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--accent);
    margin:0;
  }

  h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:27px;
    line-height:1.18;
    color:var(--ink);
    margin:0 0 10px;
    letter-spacing:-0.01em;
  }

  .sub{
    font:400 13.5px/1.55 'IBM Plex Mono', monospace;
    color:var(--ink-soft);
    margin:0;
  }

  .tear{ position:relative; height:0; border-top:2px dashed var(--line); }
  .tear::before, .tear::after{
    content:"";
    position:absolute;
    top:50%;
    width:26px; height:26px;
    border-radius:50%;
    background:var(--ink);
    transform:translateY(-50%);
  }
  .tear::before{ left:-13px; }
  .tear::after{ right:-13px; }

  label{
    display:block;
    font:600 11px/1 'IBM Plex Mono', monospace;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:8px;
  }

  textarea{
    width:100%;
    resize:vertical;
    min-height:64px;
    font:400 14px/1.5 'IBM Plex Mono', monospace;
    color:var(--ink);
    background:var(--field);
    border:1.5px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
  }
  textarea:focus, select:focus, button:focus-visible, a:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:2px;
  }

  .count{
    text-align:right;
    font-size:11px;
    color:var(--ink-soft);
    margin-top:4px;
  }

  .row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-top:16px;
  }

  select{
    font:500 13px 'IBM Plex Mono', monospace;
    color:var(--ink);
    background:var(--field);
    border:1.5px solid var(--line);
    border-radius:10px;
    padding:9px 10px;
  }

  .qr-frame{ position:relative; margin-top:18px; }

  .corner{ position:absolute; width:18px; height:18px; pointer-events:none; }
  .corner-tl{ top:-6px; left:-6px; border-top:3px solid var(--ink); border-left:3px solid var(--ink); border-radius:5px 0 0 0; }
  .corner-tr{ top:-6px; right:-6px; border-top:3px solid var(--ink); border-right:3px solid var(--ink); border-radius:0 5px 0 0; }
  .corner-bl{ bottom:-6px; left:-6px; border-bottom:3px solid var(--ink); border-left:3px solid var(--ink); border-radius:0 0 0 5px; }
  .corner-br{ bottom:-6px; right:-6px; border-bottom:3px solid var(--ink); border-right:3px solid var(--ink); border-radius:0 0 5px 0; }

  .qr-stage{
    background:var(--paper-shade);
    border-radius:14px;
    min-height:160px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px;
  }

  .qr-stage canvas, .qr-stage img{ border-radius:6px; }

  .empty-state{
    font:400 13px/1.5 'IBM Plex Mono', monospace;
    color:var(--ink-soft);
    text-align:center;
    margin:0;
  }

  .pop{ animation:popIn 280ms ease-out; }
  @keyframes popIn{ from{opacity:0; transform:scale(.94)} to{opacity:1; transform:scale(1)} }
  @media (prefers-reduced-motion: reduce){ .pop{ animation:none; } }

  .btn-primary{
    width:100%;
    margin-top:16px;
    background:var(--accent);
    color:var(--ink);
    border:none;
    border-radius:10px;
    padding:13px 18px;
    font:600 13px 'IBM Plex Mono', monospace;
    letter-spacing:.06em;
    text-transform:uppercase;
    cursor:pointer;
    box-shadow:0 0 0 rgba(255,122,51,0);
    transition:background-color 150ms ease, box-shadow 150ms ease, transform 100ms ease;
  }
  .btn-primary:hover:not(:disabled){ background:var(--accent-deep); box-shadow:0 10px 24px -8px rgba(255,122,51,.6); }
  .btn-primary:active:not(:disabled){ transform:scale(.97); }
  .btn-primary:disabled{ opacity:.45; cursor:not-allowed; }

  .footer-stub{ padding:24px 28px 28px; }

  .btn-ghost{
    display:inline-flex;
    align-items:center;
    gap:6px;
    border:1.5px solid var(--ink);
    color:var(--ink);
    background:transparent;
    padding:9px 16px;
    border-radius:999px;
    font:600 11px 'IBM Plex Mono', monospace;
    letter-spacing:.08em;
    text-transform:uppercase;
    text-decoration:none;
    transition:all 150ms ease;
  }
  .btn-ghost:hover{ background:var(--ink); color:var(--paper); }
  .btn-ghost:active{ transform:scale(.96); }

  .meta{
    margin-top:16px;
    font-size:11.5px;
    line-height:1.7;
    color:var(--ink-soft);
  }
  .meta a{ color:var(--ink-soft); text-decoration:underline; }
  .meta strong{ color:var(--ink); }

  .serial{
    font:500 10px 'IBM Plex Mono', monospace;
    letter-spacing:.1em;
    color:var(--ink-soft);
    opacity:.7;
    text-align:right;
    margin:0 0 14px;
  }

  .visually-hidden{
    position:absolute; width:1px; height:1px;
    overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap;
  }

  @media (max-width:480px){
    .stage{ padding:18px; border-radius:24px; }
    .stub, .footer-stub{ padding:22px 20px; }
    h1{ font-size:23px; }
  }
</style>
</head>
<body>

  <div class="stage">
    <div class="ticket">

      <header class="stub">
        <div class="eyebrow-row">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <path d="M1 4V1H4" stroke="#FF7A33" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M13 4V1H10" stroke="#FF7A33" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M1 10V13H4" stroke="#FF7A33" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M13 10V13H10" stroke="#FF7A33" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <p class="eyebrow">QR · INSTANT</p>
        </div>
        <h1>Anything becomes scannable.</h1>
        <p class="sub">Paste a link, a WiFi key, your number — get a code you can show, print, or send.</p>
      </header>

      <div class="tear" aria-hidden="true"></div>

      <section class="stub">
        <label for="qrText">What do you want to share?</label>
        <textarea id="qrText" maxlength="180" placeholder="Paste a link, text, or contact info…">https://vikash8769.github.io</textarea>
        <div class="count"><span id="charCount">0</span>/180</div>

        <div class="row">
          <label for="qrSize" style="margin:0;">Size</label>
          <select id="qrSize">
            <option value="160">Small</option>
            <option value="220" selected>Medium</option>
            <option value="300">Large</option>
          </select>
        </div>

        <div class="qr-frame">
          <span class="corner corner-tl" aria-hidden="true"></span>
          <span class="corner corner-tr" aria-hidden="true"></span>
          <span class="corner corner-bl" aria-hidden="true"></span>
          <span class="corner corner-br" aria-hidden="true"></span>
          <div class="qr-stage" id="qrWrap"></div>
        </div>
        <p id="qrStatus" class="visually-hidden" role="status" aria-live="polite"></p>

        <button class="btn-primary" id="downloadBtn" type="button">Download PNG</button>
      </section>

      <div class="tear" aria-hidden="true"></div>

      <footer class="footer-stub">
        <p class="serial" id="serialNo" aria-hidden="true"></p>
        <a class="btn-ghost" href="https://digitalheroesco.com" target="_blank" rel="noopener">Built for Digital Heroes</a>
        <p class="meta">
          <strong>Vikash Ranjan</strong><br>
          <a href="mailto:Ucet.itvikashranjan2028@gmail.com">Ucet.itvikashranjan2028@gmail.com</a><br>
          No backend · No tracking · Plain HTML, CSS &amp; JS
        </p>
      </footer>

    </div>
  </div>

<script>
  const textEl = document.getElementById('qrText');
  const sizeEl = document.getElementById('qrSize');
  const wrapEl = document.getElementById('qrWrap');
  const countEl = document.getElementById('charCount');
  const downloadBtn = document.getElementById('downloadBtn');
  const statusEl = document.getElementById('qrStatus');

  let debounceTimer;

  function updateCount(){
    countEl.textContent = textEl.value.length;
  }

  function renderQR(){
    const text = textEl.value.trim();
    const size = parseInt(sizeEl.value, 10);

    wrapEl.innerHTML = '';

    if (!text){
      const p = document.createElement('p');
      p.className = 'empty-state';
      p.textContent = 'Type something above to generate a code.';
      wrapEl.appendChild(p);
      downloadBtn.disabled = true;
      return;
    }

    new QRCode(wrapEl, {
      text: text,
      width: size,
      height: size,
      colorDark: '#10162B',
      colorLight: '#F6F1E2',
      correctLevel: QRCode.CorrectLevel.H
    });

    wrapEl.classList.remove('pop');
    requestAnimationFrame(() => wrapEl.classList.add('pop'));

    downloadBtn.disabled = false;
    statusEl.textContent = 'QR code updated.';
  }

  function downloadPNG(){
    const canvas = wrapEl.querySelector('canvas');
    if (!canvas) return;
    const link = document.createElement('a');
    link.download = 'qr-code.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  function setSerial(){
    const now = new Date();
    const y = String(now.getFullYear()).slice(2);
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    const rand = Math.floor(Math.random() * 900 + 100);
    document.getElementById('serialNo').textContent = `NO. ${y}${m}${d}-${rand}`;
  }

  textEl.addEventListener('input', () => {
    updateCount();
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(renderQR, 250);
  });

  sizeEl.addEventListener('change', renderQR);
  downloadBtn.addEventListener('click', downloadPNG);

  updateCount();
  setSerial();
  renderQR();
</script>

</body>
</html>
